<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Carlos & Esther 💍</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      font-family: 'Georgia', serif;
      background: linear-gradient(to bottom, #fdf6f0, #f7e7e1);
      color: #333;
      text-align: center;
    }

    .container {
      padding: 60px 20px;
    }

    h1 {
      font-size: 3em;
      margin-bottom: 10px;
    }

    h2 {
      font-weight: normal;
      color: #777;
    }

    .heart {
      font-size: 2em;
      margin: 20px 0;
    }

    .date {
      font-size: 1.5em;
      margin-top: 30px;
    }

    .box {
      background: white;
      padding: 30px;
      margin: 40px auto;
      max-width: 500px;
      border-radius: 10px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }

    footer {
      margin-top: 40px;
      font-size: 0.9em;
      color: #aaa;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>Carlos & Esther</h1>
    <div class="heart">💍 ❤️ 💍</div>
    <h2>¡Nos casamos!</h2>

    <div class="box">
      <p class="date">Próximamente...</p>
      <p>Esta es nuestra web de boda 💫</p>
      <p>Si estás viendo esto, es que funciona 🎉</p>
    </div>

    <footer>
      Hecho con ❤️ para nuestra boda
    </footer>
  </div>

</body>
</html>
